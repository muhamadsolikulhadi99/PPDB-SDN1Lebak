<!DOCTYPE html>
<html lang="id">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Mini Piano Anak</title>

  <link
    rel="icon"
    href="../../assets/img/logo.png"
  >

  <link
    rel="stylesheet"
    href="piano.css"
  >

</head>

<body>

  <!-- BACK BUTTON -->

  <a
    href="../../index.html"
    class="back-btn"
  >
    ⬅ Kembali
  </a>

  <!-- HEADER -->

  <header class="hero">

    <h1>
      🎹 Mini Piano Anak
    </h1>

    <p>
      Tekan piano dan belajar nada musik
    </p>

  </header>

  <!-- PIANO -->

  <section class="piano-section">

    <div class="piano">

      <div
        class="key white"
        data-note="do"
      >
        DO
      </div>

      <div
        class="key white"
        data-note="re"
      >
        RE
      </div>

      <div
        class="key white"
        data-note="mi"
      >
        MI
      </div>

      <div
        class="key white"
        data-note="fa"
      >
        FA
      </div>

      <div
        class="key white"
        data-note="sol"
      >
        SOL
      </div>

      <div
        class="key white"
        data-note="la"
      >
        LA
      </div>

      <div
        class="key white"
        data-note="si"
      >
        SI
      </div>

    </div>

  </section>

  <!-- AUDIO -->

  <audio id="do" src="audio/do.mp3"></audio>
  <audio id="re" src="audio/re.mp3"></audio>
  <audio id="mi" src="audio/mi.mp3"></audio>
  <audio id="fa" src="audio/fa.mp3"></audio>
  <audio id="sol" src="audio/sol.mp3"></audio>
  <audio id="la" src="audio/la.mp3"></audio>
  <audio id="si" src="audio/si.mp3"></audio>

  <!-- INFO -->

  <section class="info">

    <h2>
      Cara Bermain
    </h2>

    <p>
      Klik tombol piano untuk memainkan nada.
    </p>

    <p>
      Anak dapat belajar nada dasar musik:
      DO RE MI FA SOL LA SI
    </p>

  </section>

  <script src="piano.js"></script>

</body>

</html>
