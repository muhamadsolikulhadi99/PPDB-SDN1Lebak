<!DOCTYPE html>
<html lang="id">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Game Tebak Warna</title>

  <link
    rel="stylesheet"
    href="warna.css"
  >

</head>

<body>

  <div class="game-box">

    <h1>
      🌈 Tebak Warna Ceria
    </h1>

    <p id="pertanyaan">
      Klik warna merah!
    </p>

    <h2>
      Skor:
      <span id="score">0</span>
    </h2>

    <div class="warna-container">

      <div class="warna merah"></div>

      <div class="warna biru"></div>

      <div class="warna hijau"></div>

      <div class="warna kuning"></div>

      <div class="warna ungu"></div>

      <div class="warna orange"></div>

      <div class="warna pink"></div>

      <div class="warna coklat"></div>

      <div class="warna hitam"></div>

      <div class="warna putih"></div>

      <div class="warna abu"></div>

      <div class="warna laut"></div>

    </div>

    <a
      href="../../index.html"
      class="btn-home"
    >
      ⬅ Kembali
    </a>

  </div>

  <!-- AUDIO -->

  <audio id="benarSound">
    <source
      src="../../assets/audio/benar.mp3"
      type="audio/mp3"
    >
  </audio>

  <audio id="salahSound">
    <source
      src="../../assets/audio/salah.mp3"
      type="audio/mp3"
    >
  </audio>

  <script src="warna.js"></script>

</body>
</html>
